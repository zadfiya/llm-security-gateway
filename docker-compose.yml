version: "3.8"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: llm-security-gateway:latest
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      PYTHONUNBUFFERED: "1"
      DEBUG: "${DEBUG:-0}"
    # For production: don't mount the host source (use image content).
    # For local development with auto-reload, see docker-compose.override.yml which
    # mounts the repo and runs uvicorn with --reload.