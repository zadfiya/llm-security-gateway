version: "3.8"

services:
  app:
    # Development override: mount source and run uvicorn with reload so changes
    # on the host are picked up automatically.
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ./:/app
    environment:
      PYTHONUNBUFFERED: "1"
      DEBUG: "1"
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
